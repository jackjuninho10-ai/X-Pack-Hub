<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StoreX Hub</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
    -webkit-tap-highlight-color: transparent;
}

html,
body {
    width: 100%;
    min-height: 100%;
    background: #000;
    color: #fff;
}

body {
    background:
        radial-gradient(circle at 90% 0%, rgba(0, 95, 255, 0.28), transparent 36%),
        linear-gradient(180deg, #071837 0%, #020817 45%, #000000 100%);
}

body.no-scroll {
    overflow: hidden;
}

.sx-page {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
}

.sx-topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
}

.sx-store-logo {
    width: 62px;
    height: 62px;
    max-width: 62px;
    max-height: 62px;
    border-radius: 18px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 24px rgba(0, 120, 255, 0.45);
}

.sx-topbar h1 {
    font-size: 30px;
    line-height: 1;
    letter-spacing: -0.8px;
}

.sx-topbar p {
    margin-top: 5px;
    color: #a8c2ff;
    font-size: 14px;
    font-weight: 700;
}

.sx-hero-card {
    padding: 18px;
    margin-bottom: 16px;
    border-radius: 24px;
    background: linear-gradient(135deg, rgba(22, 82, 190, 0.42), rgba(2, 9, 25, 0.78));
    border: 1px solid rgba(105, 165, 255, 0.28);
    box-shadow: 0 18px 42px rgba(0, 0, 0, 0.35);
}

.sx-hero-card h2 {
    font-size: 22px;
    margin-bottom: 6px;
}

.sx-hero-card p {
    color: #c9d9ff;
    font-size: 14px;
    line-height: 1.45;
}

.sx-stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
}

.sx-stat-card {
    text-align: center;
    padding: 13px 8px;
    border-radius: 20px;
    background: rgba(5, 21, 55, 0.86);
    border: 1px solid rgba(95, 155, 255, 0.22);
}

.sx-stat-card strong {
    display: block;
    color: #67adff;
    font-size: 17px;
}

.sx-stat-card span {
    display: block;
    margin-top: 4px;
    color: #aec5ff;
    font-size: 12px;
    font-weight: 700;
}

.sx-section-title {
    margin: 8px 0 12px;
    font-size: 20px;
}

.sx-apps-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.sx-app-card {
    display: flex;
    align-items: center;
    gap: 14px;
    min-height: 96px;
    padding: 14px;
    border-radius: 24px;
    cursor: pointer;
    background: linear-gradient(135deg, rgba(3, 12, 32, 0.98), rgba(6, 29, 80, 0.88));
    border: 1px solid rgba(85, 145, 255, 0.24);
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
}

.sx-app-card:active {
    transform: scale(0.985);
    border-color: rgba(105, 170, 255, 0.72);
}

.sx-app-icon {
    width: 68px;
    height: 68px;
    max-width: 68px;
    max-height: 68px;
    border-radius: 19px;
    object-fit: cover;
    flex-shrink: 0;
}

.sx-app-content {
    flex: 1;
    min-width: 0;
}

.sx-app-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
}

.sx-app-top h3 {
    font-size: 21px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.sx-app-version {
    flex-shrink: 0;
    color: #82bbff;
    font-size: 12px;
    font-weight: 900;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(32, 105, 255, 0.16);
    border: 1px solid rgba(92, 155, 255, 0.22);
}

.sx-app-description {
    margin: 5px 0 9px;
    color: #b9cbff;
    font-size: 13px;
    line-height: 1.35;
}

.sx-app-meta {
    display: flex;
    gap: 8px;
}

.sx-app-meta span {
    color: #e4eeff;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 9px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.075);
}

.sx-footer {
    margin: 30px 0 14px;
    text-align: center;
    color: #819ddd;
    font-size: 13px;
    line-height: 1.6;
}

.sx-loading {
    padding: 24px;
    text-align: center;
    color: #bbceff;
}

.sx-details-page {
    position: fixed;
    inset: 0;
    z-index: 999;
    overflow-y: auto;
    background:
        radial-gradient(circle at 90% 0%, rgba(0, 92, 255, 0.30), transparent 34%),
        linear-gradient(180deg, #061636 0%, #020814 48%, #000000 100%);
}

.sx-details-container {
    width: 100%;
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
}

.sx-details-topbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
}

.sx-back-button {
    width: 44px;
    height: 44px;
    border: none;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    font-size: 30px;
    line-height: 1;
    cursor: pointer;
}

.sx-details-topbar h2 {
    font-size: 22px;
}

.sx-details-card {
    padding: 18px;
    border-radius: 28px;
    background: linear-gradient(150deg, rgba(5, 18, 45, 0.98), rgba(5, 31, 86, 0.88));
    border: 1px solid rgba(105, 165, 255, 0.30);
    box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
}

.sx-details-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 18px;
}

.sx-details-icon {
    width: 92px;
    height: 92px;
    max-width: 92px;
    max-height: 92px;
    border-radius: 26px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 0 26px rgba(0, 120, 255, 0.32);
}

.sx-details-header h1 {
    font-size: 29px;
}

.sx-details-header p {
    margin-top: 5px;
    color: #9ebdff;
    font-size: 14px;
    font-weight: 800;
}

.sx-details-info-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 18px;
}

.sx-details-info-box {
    padding: 12px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.055);
    border: 1px solid rgba(120, 170, 255, 0.13);
}

.sx-details-info-box span {
    display: block;
    margin-bottom: 5px;
    color: #8fb6ff;
    font-size: 12px;
    font-weight: 900;
}

.sx-details-info-box strong {
    font-size: 15px;
}

.sx-details-section {
    margin-top: 16px;
}

.sx-details-section h3 {
    margin-bottom: 8px;
    color: #69afff;
    font-size: 17px;
}

.sx-details-section p {
    color: #dbe8ff;
    font-size: 14px;
    line-height: 1.55;
}

.sx-details-section pre {
    white-space: pre-wrap;
    color: #dbe8ff;
    font-size: 14px;
    line-height: 1.55;
    padding: 13px;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.055);
    border: 1px solid rgba(120, 170, 255, 0.13);
}

.sx-download-button {
    display: block;
    width: 100%;
    margin-top: 20px;
    padding: 15px;
    text-align: center;
    text-decoration: none;
    color: white;
    font-size: 16px;
    font-weight: 900;
    border-radius: 19px;
    background: linear-gradient(135deg, #1680ff, #004ed6);
    box-shadow: 0 12px 30px rgba(0, 100, 255, 0.35);
}

@media (max-width: 520px) {
    .sx-page,
    .sx-details-container {
        padding: 14px;
    }

    .sx-store-logo {
        width: 58px;
        height: 58px;
        max-width: 58px;
        max-height: 58px;
        border-radius: 17px;
    }

    .sx-topbar h1 {
        font-size: 27px;
    }

    .sx-app-card {
        border-radius: 22px;
        padding: 13px;
    }

    .sx-app-icon {
        width: 64px;
        height: 64px;
        max-width: 64px;
        max-height: 64px;
        border-radius: 18px;
    }

    .sx-app-top h3 {
        font-size: 19px;
    }

    .sx-details-icon {
        width: 82px;
        height: 82px;
        max-width: 82px;
        max-height: 82px;
        border-radius: 23px;
    }

    .sx-details-header h1 {
        font-size: 25px;
    }
}
</style>
</head>

<body>

<main id="storexHome" class="sx-page">

    <header class="sx-topbar">
        <img src="assets/storex.png" class="sx-store-logo" alt="StoreX Hub">

        <div>
            <h1>StoreX Hub</h1>
            <p>Apps principais do X Pack</p>
        </div>
    </header>

    <section class="sx-hero-card">
        <h2>Catálogo oficial</h2>
        <p>
            Baixe os apps principais do X Pack pelo GitHub oficial,
            sem instalador interno e com menos risco de bloqueio.
        </p>
    </section>

    <section class="sx-stats-row">
        <div class="sx-stat-card">
            <strong id="appsCount">3</strong>
            <span>Apps</span>
        </div>

        <div class="sx-stat-card">
            <strong>GitHub</strong>
            <span>Fonte oficial</span>
        </div>

        <div class="sx-stat-card">
            <strong>APK</strong>
            <span>Android</span>
        </div>
    </section>

    <h2 class="sx-section-title">Aplicativos</h2>

    <section id="appsList" class="sx-apps-list">
        <p class="sx-loading">Carregando catálogo...</p>
    </section>

    <footer class="sx-footer">
        © 2026 StoreX Hub<br>
        Desenvolvido por Júnior
    </footer>

</main>

<div id="detailsHost"></div>

<script>
const appsList = document.getElementById("appsList");
const appsCount = document.getElementById("appsCount");
const detailsHost = document.getElementById("detailsHost");

function cleanOldContent() {
    Array.from(document.body.childNodes).forEach(node => {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim() !== "") {
            node.remove();
        }

        if (node.nodeType === Node.ELEMENT_NODE) {
            const id = node.id;
            const tag = node.tagName.toLowerCase();

            if (id === "storexHome" || id === "detailsHost" || tag === "script") {
                return;
            }

            node.remove();
        }
    });
}

async function loadApps() {
    cleanOldContent();

    try {
        const response = await fetch("apps.json?v=" + Date.now());

        if (!response.ok) {
            throw new Error("apps.json não encontrado");
        }

        const apps = await response.json();

        appsCount.textContent = apps.length;
        appsList.innerHTML = "";
        detailsHost.innerHTML = "";

        apps.forEach(app => {
            const card = document.createElement("article");
            card.className = "sx-app-card";

            const icon = document.createElement("img");
            icon.className = "sx-app-icon";
            icon.src = app.icon;
            icon.alt = app.name;

            const content = document.createElement("div");
            content.className = "sx-app-content";

            const top = document.createElement("div");
            top.className = "sx-app-top";

            const name = document.createElement("h3");
            name.textContent = app.name;

            const version = document.createElement("span");
            version.className = "sx-app-version";
            version.textContent = app.versionName;

            top.appendChild(name);
            top.appendChild(version);

            const desc = document.createElement("p");
            desc.className = "sx-app-description";
            desc.textContent = app.description;

            const meta = document.createElement("div");
            meta.className = "sx-app-meta";

            const size = document.createElement("span");
            size.textContent = app.size;

            const type = document.createElement("span");
            type.textContent = "APK";

            meta.appendChild(size);
            meta.appendChild(type);

            content.appendChild(top);
            content.appendChild(desc);
            content.appendChild(meta);

            card.appendChild(icon);
            card.appendChild(content);

            card.addEventListener("click", () => openDetails(app));

            appsList.appendChild(card);
        });

    } catch (error) {
        appsList.innerHTML = "<p class='sx-loading'>Erro ao carregar o catálogo. Confira o apps.json.</p>";
    }
}

function openDetails(app) {
    detailsHost.innerHTML = "";

    const detailsPage = document.createElement("section");
    detailsPage.className = "sx-details-page";

    const container = document.createElement("div");
    container.className = "sx-details-container";

    const topbar = document.createElement("header");
    topbar.className = "sx-details-topbar";

    const back = document.createElement("button");
    back.className = "sx-back-button";
    back.textContent = "‹";
    back.addEventListener("click", closeDetails);

    const title = document.createElement("h2");
    title.textContent = "Detalhes do app";

    topbar.appendChild(back);
    topbar.appendChild(title);

    const card = document.createElement("article");
    card.className = "sx-details-card";

    const header = document.createElement("div");
    header.className = "sx-details-header";

    const icon = document.createElement("img");
    icon.className = "sx-details-icon";
    icon.src = app.icon;
    icon.alt = app.name;

    const nameBox = document.createElement("div");

    const name = document.createElement("h1");
    name.textContent = app.name;

    const versionText = document.createElement("p");
    versionText.textContent = "Versão mais atual • " + app.versionName;

    nameBox.appendChild(name);
    nameBox.appendChild(versionText);

    header.appendChild(icon);
    header.appendChild(nameBox);

    const infoGrid = document.createElement("div");
    infoGrid.className = "sx-details-info-grid";

    infoGrid.appendChild(createInfoBox("VERSÃO MAIS ATUAL", app.versionName));
    infoGrid.appendChild(createInfoBox("TAMANHO", app.size));

    card.appendChild(header);
    card.appendChild(infoGrid);
    card.appendChild(createTextSection("Descrição", app.description || "Sem descrição disponível."));
    card.appendChild(createPreSection("Última atualização", app.latestUpdateLog || "Sem changelog disponível."));
    card.appendChild(createTextSection("Sobre o app", app.aboutLog || app.about || "Sem informações adicionais."));

    const download = document.createElement("a");
    download.className = "sx-download-button";
    download.href = app.apkUrl;
    download.target = "_blank";
    download.rel = "noopener noreferrer";
    download.textContent = "Baixar APK";

    card.appendChild(download);

    container.appendChild(topbar);
    container.appendChild(card);
    detailsPage.appendChild(container);
    detailsHost.appendChild(detailsPage);

    document.body.classList.add("no-scroll");
}

function createInfoBox(labelText, valueText) {
    const box = document.createElement("div");
    box.className = "sx-details-info-box";

    const label = document.createElement("span");
    label.textContent = labelText;

    const value = document.createElement("strong");
    value.textContent = valueText;

    box.appendChild(label);
    box.appendChild(value);

    return box;
}

function createTextSection(titleText, text) {
    const section = document.createElement("section");
    section.className = "sx-details-section";

    const title = document.createElement("h3");
    title.textContent = titleText;

    const paragraph = document.createElement("p");
    paragraph.textContent = text;

    section.appendChild(title);
    section.appendChild(paragraph);

    return section;
}

function createPreSection(titleText, text) {
    const section = document.createElement("section");
    section.className = "sx-details-section";

    const title = document.createElement("h3");
    title.textContent = titleText;

    const pre = document.createElement("pre");
    pre.textContent = text;

    section.appendChild(title);
    section.appendChild(pre);

    return section;
}

function closeDetails() {
    detailsHost.innerHTML = "";
    document.body.classList.remove("no-scroll");
}

window.addEventListener("keydown", event => {
    if (event.key === "Escape") {
        closeDetails();
    }
});

loadApps();
</script>

</body>
</html>
